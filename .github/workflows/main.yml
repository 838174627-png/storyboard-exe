name: Build EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - run: npm install
    - run: npm run dist

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: exe-file
        path: dist/*.exe
